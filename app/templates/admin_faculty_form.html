{% extends "base.html" %}

{% block title %}Thêm Khoa/Viện - Admin{% endblock %}

{% block extra_css %}
<style>
    .form-container {
        max-width: 600px;
        margin: 50px auto;
        background: white;
        padding: 40px;
        border-radius: 12px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
    }

    .form-group {
        margin-bottom: 20px;
    }

    .form-group label {
        display: block;
        margin-bottom: 8px;
        font-weight: 600;
    }

    .form-group input,
    .form-group select {
        width: 100%;
        padding: 10px;
        border: 1px solid #DDD;
        border-radius: 8px;
    }

    .form-actions {
        display: flex;
        gap: 10px;
        margin-top: 20px;
    }

    .btn-submit {
        flex: 1;
        padding: 10px;
        background-color: var(--neu-blue);
        color: white;
        border: none;
        border-radius: 8px;
        font-weight: 600;
        cursor: pointer;
    }

    .btn-cancel {
        flex: 1;
        padding: 10px;
        background-color: #EEE;
        border: 1px solid #DDD;
        border-radius: 8px;
        font-weight: 600;
        cursor: pointer;
        text-decoration: none;
        text-align: center;
    }
</style>
{% endblock %}

{% block content %}
<div class="form-container">
    <h1><i class="fa-solid fa-sitemap me-2"></i>Thêm Khoa/Viện</h1>

    <form method="POST">
        <div class="form-group">
            <label>Mã Khoa</label>
            <input type="text" name="ma_khoa" placeholder="VD: CNTT" required />
        </div>

        <div class="form-group">
            <label>Tên Khoa</label>
            <input type="text" name="ten_khoa" placeholder="VD: Viện Công nghệ thông tin" required />
        </div>

        <div class="form-group">
            <label>Trường</label>
            <select name="truong_id" required>
                <option value="">Chọn Trường...</option>
            </select>
        </div>

        <div class="form-actions">
            <button type="submit" class="btn-submit">Thêm</button>
            <a href="{{ url_for('course.admin_faculties') }}" class="btn-cancel">Hủy</a>
        </div>
    </form>
</div>
{% endblock %}
