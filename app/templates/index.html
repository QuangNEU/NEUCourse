{% extends "base.html" %}

{% block title %}Tra cứu Chương trình đào tạo - NEU{% endblock %}

{% block extra_css %}
<style>
    /* Search Section Styles */
    .search-section {
        padding: 60px 0 40px;
        background-color: white;
    }

    .search-title {
        font-size: 2.5rem;
        font-weight: 700;
        color: var(--text-main);
        margin-bottom: 30px;
    }

    .search-wrapper {
        max-width: 700px;
        margin: 0 auto;
        position: relative;
    }

    .search-pill {
        border-radius: 50px;
        padding: 15px 30px;
        padding-right: 60px;
        border: 2px solid #EEE;
        font-size: 1.1rem;
        box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        transition: border-color 0.2s, box-shadow 0.2s;
    }

    .search-pill:focus {
        border-color: var(--neu-blue);
        box-shadow: 0 4px 20px rgba(8, 92, 167, 0.1);
        outline: none;
    }

    .search-icon-btn {
        position: absolute;
        right: 20px;
        top: 50%;
        transform: translateY(-50%);
        background: none;
        border: none;
        color: var(--neu-blue);
        font-size: 1.2rem;
        cursor: pointer;
    }

    /* Tabs & Filters Styles */
    .filter-container {
        background-color: white;
        border-bottom: 1px solid var(--border-color);
        padding-top: 10px;
    }

    .nav-tabs-neu {
        border-bottom: none;
    }

    .nav-tabs-neu .nav-link {
        border: none;
        color: var(--text-muted);
        font-weight: 500;
        padding: 12px 20px;
        position: relative;
        transition: color 0.2s;
    }

    .nav-tabs-neu .nav-link:hover {
        color: var(--neu-blue);
    }

    .nav-tabs-neu .nav-link.active {
        color: var(--neu-blue);
        background: none;
    }

    .nav-tabs-neu .nav-link.active::after {
        content: "";
        position: absolute;
        bottom: 0;
        left: 20px;
        right: 20px;
        height: 3px;
        background-color: var(--neu-blue);
        border-radius: 3px 3px 0 0;
    }

    .filter-controls {
        display: flex;
        align-items: center;
        gap: 15px;
        padding-bottom: 10px;
    }

    .form-select-sm {
        border-radius: 8px;
        border-color: #EEE;
    }

    .view-toggle {
        display: flex;
        background-color: #F0F2F5;
        border-radius: 8px;
        padding: 3px;
    }

    .view-btn {
        border: none;
        background: none;
        padding: 5px 10px;
        border-radius: 6px;
        color: var(--text-muted);
        transition: all 0.2s;
    }

    .view-btn.active {
        background-color: white;
        color: var(--neu-blue);
        box-shadow: 0 2px 5px rgba(0,0,0,0.05);
    }
</style>
{% endblock %}

{% block content %}
<!-- Search Section -->
<section class="search-section text-center">
    <div class="container">
        <h1 class="search-title">Tra cứu</h1>
        <div class="search-wrapper">
            <input type="text" class="form-control search-pill" placeholder="Tìm kiếm ngành, học phần, khoa...">
            <button class="search-icon-btn"><i class="fa-solid fa-magnifying-glass"></i></button>
        </div>
    </div>
</section>

<!-- Filters & Tabs Section -->
<section class="filter-container">
    <div class="container">
        <div class="d-flex justify-content-between align-items-end">
            <!-- Tabs -->
            <ul class="nav nav-tabs nav-tabs-neu" id="mainTabs" role="tablist">
                <li class="nav-item">
                    <button class="nav-link active" id="nganh-tab" data-bs-toggle="tab" data-bs-target="#nganh" type="button">Ngành/Chương trình</button>
                </li>
                <li class="nav-item">
                    <button class="nav-link" id="hocphan-tab" data-bs-toggle="tab" data-bs-target="#hocphan" type="button">Học phần</button>
                </li>
                <li class="nav-item">
                    <button class="nav-link" id="khoa-tab" data-bs-toggle="tab" data-bs-target="#khoa" type="button">Khoa/Viện</button>
                </li>
                <li class="nav-item">
                    <button class="nav-link" id="truong-tab" data-bs-toggle="tab" data-bs-target="#truong" type="button">Trường</button>
                </li>
            </ul>

            <!-- Right Controls -->
            <div class="filter-controls">
                <div class="d-flex align-items-center">
                    <span class="text-muted small me-2">Phiên bản:</span>
                    <select class="form-select form-select-sm" style="width: 120px;">
                        <option value="2026">K68 - 2026</option>
                        <option value="2025">K67 - 2025</option>
                        <option value="2024">K66 - 2024</option>
                    </select>
                </div>
                <div class="view-toggle">
                    <button class="view-btn active" title="List View"><i class="fa-solid fa-list"></i></button>
                    <button class="view-btn" title="Grid View"><svg viewBox="64 64 896 896" focusable="false" data-icon="appstore" width="1em" height="1em" fill="currentColor" aria-hidden="true"><path d="M464 144H160c-8.8 0-16 7.2-16 16v304c0 8.8 7.2 16 16 16h304c8.8 0 16-7.2 16-16V160c0-8.8-7.2-16-16-16zm-52 268H212V212h200v200zm452-268H560c-8.8 0-16 7.2-16 16v304c0 8.8 7.2 16 16 16h304c8.8 0 16-7.2 16-16V160c0-8.8-7.2-16-16-16zm-52 268H612V212h200v200zM464 544H160c-8.8 0-16 7.2-16 16v304c0 8.8 7.2 16 16 16h304c8.8 0 16-7.2 16-16V560c0-8.8-7.2-16-16-16zm-52 268H212V612h200v200zm452-268H560c-8.8 0-16 7.2-16 16v304c0 8.8 7.2 16 16 16h304c8.8 0 16-7.2 16-16V560c0-8.8-7.2-16-16-16zm-52 268H612V612h200v200z"></path></svg><i class="fa-solid fa-grid-2"></i></button>
                </div>
            </div>
        </div>
    </div>
</section>

<!-- Data Display Section -->
<section class="py-4">
    <div class="container">
        <div class="tab-content" id="mainTabsContent">
            <!-- Tab Pane: Ngành -->
            <div class="tab-pane fade show active" id="nganh" role="tabpanel">
                <div id="nganh-data-container">
                    <!-- Data will be loaded via AJAX -->
                    <div class="text-center py-5 text-muted">
                        <div class="spinner-border text-primary mb-3" role="status"></div>
                        <p>Đang tải dữ liệu...</p>
                    </div>
                </div>
            </div>
            
            <!-- Tab Pane: Học phần -->
            <div class="tab-pane fade" id="hocphan" role="tabpanel">
                <div id="hocphan-data-container"></div>
            </div>

            <!-- Tab Pane: Khoa/Viện -->
            <div class="tab-pane fade" id="khoa" role="tabpanel">
                <div id="khoa-data-container"></div>
            </div>

            <!-- Tab Pane: Trường -->
            <div class="tab-pane fade" id="truong" role="tabpanel">
                <div id="truong-data-container"></div>
            </div>
        </div>

        <!-- Pagination (Static for UI structure) -->
        <div class="d-flex justify-content-between align-items-center mt-4 pt-3 border-top">
            <div class="d-flex align-items-center">
                <span class="text-muted small me-2">Hiển thị:</span>
                <select class="form-select form-select-sm" style="width: 80px;">
                    <option value="10">10</option>
                    <option value="20" selected>20</option>
                    <option value="50">50</option>
                    <option value="100">100</option>
                </select>
            </div>
            <nav aria-label="Page navigation">
                <ul class="pagination pagination-sm mb-0">
                    <li class="page-item disabled"><a class="page-link" href="#"><</a></li>
                    <li class="page-item active"><a class="page-link" href="#">1</a></li>
                    <li class="page-item"><a class="page-link" href="#">2</a></li>
                    <li class="page-item"><a class="page-link" href="#">3</a></li>
                    <li class="page-item"><a class="page-link" href="#">></a></li>
                </ul>
            </nav>
        </div>
    </div>
</section>
{% endblock %}
