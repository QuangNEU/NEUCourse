{% extends "base.html" %}

{% block title %}Quản lý Học phần - Admin{% endblock %}

{% block extra_css %}
<style>
    .admin-page-header {
        background: linear-gradient(135deg, var(--neu-blue) 0%, #0652A3 100%);
        color: white;
        padding: 30px 0;
        margin-bottom: 30px;
    }

    .btn-add {
        background-color: var(--neu-orange);
        color: white;
        padding: 10px 20px;
        border: none;
        border-radius: 8px;
        font-weight: 600;
        text-decoration: none;
    }

    .table-container {
        background: white;
        border-radius: 12px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
    }

    .admin-table {
        width: 100%;
        border-collapse: collapse;
    }

    .admin-table thead {
        background-color: var(--neu-blue);
        color: white;
    }

    .admin-table th, .admin-table td {
        padding: 15px;
        text-align: left;
    }
</style>
{% endblock %}

{% block content %}
<div class="admin-page-header">
    <div class="container">
        <h1><i class="fa-solid fa-book me-3"></i>Quản lý Học phần</h1>
    </div>
</div>

<div class="container" style="padding: 30px 0;">
    <a href="{{ url_for('course.admin_course_create') }}" class="btn-add">
        <i class="fa-solid fa-plus"></i> Thêm Học phần
    </a>

    <div class="table-container" style="margin-top: 20px;">
        <table class="admin-table">
            <thead>
                <tr>
                    <th>Mã</th>
                    <th>Tên Học phần</th>
                    <th>Tín chỉ</th>
                    <th>Khoa</th>
                    <th>Hành động</th>
                </tr>
            </thead>
            <tbody id="courses">
            </tbody>
        </table>
    </div>
</div>

<script>
    fetch('/api/courses')
        .then(r => r.json())
        .then(data => {
            document.getElementById('courses').innerHTML = data.data.map(c => `
                <tr>
                    <td>${c.ma}</td>
                    <td>${c.ten}</td>
                    <td>${c.tin_chi}</td>
                    <td>${c.khoa}</td>
                    <td><button class="btn btn-primary btn-sm">Sửa</button></td>
                </tr>
            `).join('');
        });
</script>
{% endblock %}
